name: as_email_service
volumes:
  redis_data:
    name: "as_email_redis_data_01"

services:
  web:
    image: "as_email_service:dev"
    build:
      context: .
      dockerfile: ./Dockerfile
      target: dev
      platforms:
        - "linux/amd64"
        - "linux/arm64"
        # - "linux/arm/v7"   # when we want to build for raspberry pi's
    depends_on:
      mailpit:
        condition: service_started
      redis:
        condition: service_healthy
    ports:
      - "11578:8000"
    command: wait-for-it --service redis:6379 -- /app/manage.py runserver_plus --cert-file /mnt/ssl/ssl_crt.pem --key-file /mnt/ssl/ssl_key.pem 0.0.0.0:8000
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./app:/app:z
      - "${HOST_DB_DIR}:/mnt/db:z"
      - "${HOST_SPOOL_ROOT}:/mnt/spool:z"
      - "${HOST_MAIL_ROOT}:/mnt/mail_dirs:z"
      - "${HOST_SSL_DIR}:/mnt/ssl:ro"
      - type: bind
        source: ./pyproject.toml
        target: /app/pyproject.toml
        read_only: true

  smtpd:
    image: as_email_service:dev
    build:
      context: .
      dockerfile: ./Dockerfile
      target: dev
    ports:
      # - "25:25"
      - "587:587"
    command: /app/scripts/start_smtpd.sh
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./app:/app:z
      - "${HOST_DB_DIR}:/mnt/db:z"
      - "${HOST_SPOOL_ROOT}:/mnt/spool:z"
      - "${HOST_SSL_DIR}:/mnt/ssl:ro"
      - "${HOST_LOG_DIR:-./logs/as_email}:/var/log/as_email:z"

  worker:
    image: as_email_service:dev
    command: /app/scripts/start_worker.sh
    restart: unless-stopped
    env_file: .env
    volumes:
      - "${HOST_DB_DIR}:/mnt/db:z"
      - "${HOST_SPOOL_ROOT}:/mnt/spool:z"
      - "${HOST_MAIL_ROOT}:/mnt/mail_dirs:z"

  redis:
    image: redis:latest
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - "redis_data:/data"
      - type: bind
        source: ${PWD}/config/redis/redis.conf
        target: /usr/local/etc/redis/redis.conf
    expose:
      - 6379

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "8026:8025"

  sa-training:
    image: as_email_service:dev
    profiles:
      - tools
    env_file: .env
    volumes:
      - "${HOST_DB_DIR}:/mnt/db:z"
      - "${HOST_MAIL_ROOT}:/mnt/mail_dirs:z"
      - "${HOST_SPAMA_DIR:-./spama}/training:/mnt/training:z"
    command: /app/manage.py as_email_sa_training /mnt/training

  spamassassin:
    image: instantlinux/spamassassin:4.0.1-1
    restart: unless-stopped
    ports:
      - "783:783"
    volumes:
      - "${HOST_SPAMA_DIR:-./spama}/local.cf:/etc/mail/spamassassin/local.cf:ro"
      - "${HOST_SPAMA_DIR:-./spama}/local.pre:/etc/mail/spamassassin/local.pre:ro"
      - "${HOST_SPAMA_DIR:-./spama}/home:/var/lib/spamassassin"
      - "${HOST_SPAMA_DIR:-./spama}/logs:/var/log"
      - "${HOST_SPAMA_DIR:-./spama}/training:/mnt/training"
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 10
    env_file: .env
    expose:
      - 783
