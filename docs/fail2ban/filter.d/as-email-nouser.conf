# fail2ban filter: as_email_service — nonexistent account attempts
#
# Matches AUTH_FAIL_NOUSER security log lines. These are login attempts
# for email addresses that do not exist on this server — a strong signal
# of credential stuffing. Recommended: maxretry=1 (immediate ban).
#
[Definition]
failregex = ^\s*AUTH_FAIL_NOUSER ip=<HOST> user=\S+$
ignoreregex =
datepattern = ^\[%%Y-%%m-%%d %%H:%%M:%%S\]
