# fail2ban filter: as_email_service — DNSBL rejection
#
# Matches DNSBL_REJECT security log lines. These are connections from
# IPs already listed on DNS blacklists. Banning at the firewall avoids
# repeated TLS handshake overhead for known-bad IPs.
# Recommended: maxretry=1 (immediate ban).
#
[Definition]
failregex = ^\[.*\] DNSBL_REJECT ip=<HOST> providers=\S+$
ignoreregex =
datepattern = ^\[%%Y-%%m-%%d %%H:%%M:%%S\]
