# fail2ban filter: as_email_service — regular wrong password
#
# Matches AUTH_FAIL_PASSWD security log lines. These are wrong-password
# attempts against real accounts that are NOT in PROTECTED_ACCOUNTS.
# A higher maxretry is appropriate since legitimate users sometimes
# mistype passwords during mail client setup.
# Recommended: maxretry=5.
#
[Definition]
failregex = ^\[.*\] AUTH_FAIL_PASSWD ip=<HOST> user=\S+$
ignoreregex =
datepattern = ^\[{^LN-BEG}
