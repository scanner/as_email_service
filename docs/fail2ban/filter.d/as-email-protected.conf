# fail2ban filter: as_email_service — protected account wrong password
#
# Matches AUTH_FAIL_PROTECTED security log lines. These are wrong-password
# attempts against accounts listed in PROTECTED_ACCOUNTS (e.g. admin@,
# root@, postmaster@) — common brute-force targets.
# Recommended: maxretry=1 (immediate ban).
#
[Definition]
failregex = ^\[.*\] AUTH_FAIL_PROTECTED ip=<HOST> user=\S+$
ignoreregex =
datepattern = ^\[{^LN-BEG}
