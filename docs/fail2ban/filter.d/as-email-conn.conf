# fail2ban filter: as_email_service — connection errors and denied reconnections
#
# Matches CONN_DENIED (reconnection after auth blacklist), SSL_ERROR
# (TLS handshake failures), and SMTP_EXCEPTION (other protocol errors).
# Some legitimate clients have TLS issues, so use a moderate threshold.
# Recommended: maxretry=5.
#
[Definition]
failregex = ^\s*CONN_DENIED ip=<HOST>$
            ^\s*SSL_ERROR ip=<HOST> error=.*$
            ^\s*SMTP_EXCEPTION ip=<HOST> error=\S+$
ignoreregex =
datepattern = ^\[%%Y-%%m-%%d %%H:%%M:%%S\]
