# fail2ban filter: as_email_service — connection flood
#
# Matches CONN_FLOOD security log lines. These are emitted when a single
# IP exceeds the connection-frequency threshold (default: >10 in 60s).
# Recommended: maxretry=1 (immediate ban).
#
[Definition]
failregex = ^\[.*\] CONN_FLOOD ip=<HOST> count=\d+$
ignoreregex =
datepattern = ^\[%%Y-%%m-%%d %%H:%%M:%%S\]
