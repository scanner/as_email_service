# as_email_service fail2ban jails
#
# Install: copy to /etc/fail2ban/jail.d/
# Requires: filter files from docs/fail2ban/filter.d/ in /etc/fail2ban/filter.d/
#
# Thresholds are based on analysis of 94 hours of production SMTP logs
# (10K events, 2,897 unique attacker IPs). Adjust to match your traffic.
#
# See docs/fail2ban-integration.md for setup and tuning guidance.

# Nonexistent account — highest-value ban. Immediate ban on first
# attempt. Analysis shows this also pre-blocks 39.5% of IPs that would
# later try real accounts (median gap: 32 minutes).
#
[as-email-nouser]
enabled  = true
filter   = as-email-nouser
logpath  = /var/log/as_email/security.log
maxretry = 1
findtime = 24h
bantime  = 24h
action   = iptables-multiport[name=as-email-nouser, port="25,587", protocol=tcp]
bantime.increment = true
bantime.factor    = 24
bantime.maxtime   = 4w

# Protected account wrong password — immediate ban. For accounts like
# admin@, root@, postmaster@ that are nearly always brute-force targets
# (e.g. admin@ saw 770 attempts from 648 IPs in 4 days).
#
[as-email-protected]
enabled  = true
filter   = as-email-protected
logpath  = /var/log/as_email/security.log
maxretry = 1
findtime = 24h
bantime  = 24h
action   = iptables-multiport[name=as-email-protected, port="25,587", protocol=tcp]
bantime.increment = true
bantime.factor    = 24
bantime.maxtime   = 4w

# Regular wrong password — generous threshold to accommodate users
# struggling with mail client setup. 5 failures in 10 minutes triggers
# a 1-hour ban.
#
[as-email-passwd]
enabled  = true
filter   = as-email-passwd
logpath  = /var/log/as_email/security.log
maxretry = 5
findtime = 10m
bantime  = 1h
action   = iptables-multiport[name=as-email-passwd, port="25,587", protocol=tcp]
bantime.increment = true
bantime.factor    = 4
bantime.maxtime   = 1w

# Connection flood — no legitimate reason for >10 connections in 60s
# from one IP.
#
[as-email-flood]
enabled  = true
filter   = as-email-flood
logpath  = /var/log/as_email/security.log
maxretry = 1
findtime = 1h
bantime  = 24h
action   = iptables-multiport[name=as-email-flood, port="25,587", protocol=tcp]
bantime.increment = true
bantime.factor    = 24
bantime.maxtime   = 4w

# DNSBL rejection — already identified as malicious by DNS blacklists.
# Banning at the firewall avoids repeated TLS handshake overhead.
#
[as-email-dnsbl]
enabled  = true
filter   = as-email-dnsbl
logpath  = /var/log/as_email/security.log
maxretry = 1
findtime = 24h
bantime  = 24h
action   = iptables-multiport[name=as-email-dnsbl, port="25,587", protocol=tcp]

# Connection errors — SSL failures, denied reconnections, protocol
# errors. Some legitimate clients have TLS issues, so use a moderate
# threshold.
#
[as-email-conn]
enabled  = true
filter   = as-email-conn
logpath  = /var/log/as_email/security.log
maxretry = 5
findtime = 10m
bantime  = 1h
action   = iptables-multiport[name=as-email-conn, port="25,587", protocol=tcp]
bantime.increment = true
bantime.factor    = 4
bantime.maxtime   = 1w
